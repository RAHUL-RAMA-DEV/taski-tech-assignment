stages:
  - lint
  - test
  - integration
  - build
  - deploy

variables:
  NODE_ENV: test

lint:
  image: node:18
  stage: lint
  script:
    - npm ci
    - npx --no-install eslint .

unit_test:
  image: node:18
  stage: test
  script:
    - npm ci
    - npx --no-install jest

integration_test:
  image: node:18
  stage: integration
  script:
    - echo "Running integration tests"
    - npm ci
    - npx --no-install jest --detectOpenHandles

build:
  image: docker:latest
  stage: build
  services:
    - docker:dind
  script:
    - docker build -t hello-app .
    - echo "Logging into Docker Hub..."
    - docker login -u "$DOCKER_USERNAME" -p "$DOCKER_PASSWORD"
    - echo "Building image..."
    - docker build -t $DOCKER_USERNAME/hello-app:latest .
    - echo "Pushing image..."
    - docker push $DOCKER_USERNAME/hello-app:latest

deploy:
  image: bitnami/kubectl:latest
  stage: deploy
  script:
    - export IMAGE_TAG=$CI_COMMIT_SHORT_SHA
    - echo "Deploying image $IMAGE_TAG"

    - sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" deployment.yaml

    - kubectl apply -f deployment.yaml
